name: Refresh valuation data

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Space-separated ticker list to regenerate'
        required: false
        default: 'AAPL MSFT NVDA GOOGL AMZN META TSLA JPM MA JNJ LLY UNH XOM WMT COST PG KO CAT NEE PLD LIN'
  # Automatic SEC/price refresh is suspended after the multi-repo rollback.
  # Use workflow_dispatch only after reviewing the generated valuation snapshots.

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Generate static valuation data
        env:
          TICKERS: ${{ github.event.inputs.tickers || 'AAPL MSFT NVDA GOOGL AMZN META TSLA JPM MA JNJ LLY UNH XOM WMT COST PG KO CAT NEE PLD LIN' }}
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
        run: |
          if [ -z "${SEC_USER_AGENT:-}" ]; then
            echo "Set repository variable SEC_USER_AGENT to a descriptive SEC User-Agent with contact."
            exit 1
          fi
          python scripts/update_data.py --tickers "$TICKERS" --output docs/data --user-agent "$SEC_USER_AGENT" --verbose
      - name: Validate generated artifacts
        run: npm run build
      - name: Commit data refresh
        run: |
          if git diff --quiet -- docs/data; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          cat > /tmp/valuation-data-commit-message <<'EOF'
          Refresh valuation snapshots for reproducible Pages output

          Constraint: GitHub Pages serves static JSON generated from public SEC and price snapshots.
          Confidence: medium
          Scope-risk: narrow
          Directive: Keep browser data access same-origin; do not edit sibling dashboards.
          Tested: npm run build
          Not-tested: Manual investment interpretation for every ticker
          EOF
          git commit -F /tmp/valuation-data-commit-message
          git push
