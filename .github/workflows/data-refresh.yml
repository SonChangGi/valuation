name: Refresh valuation data

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Operation to run'
        required: true
        default: 'refresh'
        type: choice
        options:
          - refresh
          - sec-egress-smoke
      tickers:
        description: 'Space-separated ticker list to regenerate'
        required: false
        default: 'AAPL MSFT NVDA GOOGL AMZN META TSLA JPM MA JNJ LLY UNH XOM WMT COST PG KO CAT NEE PLD LIN'
  schedule:
    # 14:15 KST Tue-Sat: staggered SEC/price snapshot refresh after U.S. close data settles.
    - cron: "15 5 * * 2-6"
    # 16:15 KST Tue-Sat: 2-hour retry for provider/API lag.
    - cron: "15 7 * * 2-6"

permissions:
  contents: write

jobs:
  sec-egress-smoke:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'sec-egress-smoke'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Verify docs/data starts unchanged
        run: test -z "$(git status --porcelain --untracked-files=all -- docs/data)"
      - name: Configure masked SEC User-Agent
        env:
          SEC_USER_AGENT_VALUE: ${{ vars.SEC_USER_AGENT }}
        run: |
          if [ -z "${SEC_USER_AGENT_VALUE:-}" ]; then
            echo "::error::Repository variable SEC_USER_AGENT is required."
            exit 2
          fi
          echo "::add-mask::$SEC_USER_AGENT_VALUE"
          printf 'SEC_USER_AGENT=%s\n' "$SEC_USER_AGENT_VALUE" >> "$GITHUB_ENV"
      - name: Run strict SEC egress gate
        run: python scripts/probe_providers.py --sec-strict-gate
      - name: Verify docs/data remains unchanged
        if: always()
        run: test -z "$(git status --porcelain --untracked-files=all -- docs/data)"

  refresh:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'refresh')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - name: Decide whether valuation refresh is needed
        id: freshness
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: python scripts/check_data_freshness.py --event-name "$EVENT_NAME" --event-schedule "$EVENT_SCHEDULE"
      - name: Generate static valuation data
        if: steps.freshness.outputs.should_update == 'true'
        env:
          TICKERS: ${{ github.event.inputs.tickers || 'AAPL MSFT NVDA GOOGL AMZN META TSLA JPM MA JNJ LLY UNH XOM WMT COST PG KO CAT NEE PLD LIN' }}
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
        run: |
          if [ -z "${SEC_USER_AGENT:-}" ]; then
            echo "Set repository variable SEC_USER_AGENT to a descriptive SEC User-Agent with contact."
            exit 1
          fi
          python scripts/update_data.py --tickers "$TICKERS" --output docs/data --user-agent "$SEC_USER_AGENT" --verbose
      - name: Validate generated artifacts
        run: npm run build
      - name: Verify publication freshness and broad market coverage
        if: steps.freshness.outputs.should_update == 'true'
        run: python scripts/verify_publication_freshness.py
      - name: Commit data refresh
        if: steps.freshness.outputs.should_update == 'true'
        run: |
          if git diff --quiet -- docs/data; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          cat > /tmp/valuation-data-commit-message <<'EOF'
          Refresh valuation snapshots for reproducible Pages output

          Constraint: GitHub Pages serves static JSON generated from public SEC and price snapshots.
          Confidence: medium
          Scope-risk: narrow
          Directive: Keep browser data access same-origin; do not edit sibling dashboards.
          Tested: npm run build; python scripts/verify_publication_freshness.py
          Not-tested: Manual investment interpretation for every ticker
          EOF
          git commit -F /tmp/valuation-data-commit-message
          git push
