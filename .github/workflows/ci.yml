name: CI

on:
  pull_request:
  push:
    branches: [main, feat/valuation]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run tests
        run: npm test
      - name: Build / offline static validation
        run: npm run build
