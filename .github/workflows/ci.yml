name: CI

on:
  pull_request:
  push:
    branches: [main, feat/valuation]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Run tests
        run: npm test
      - name: Build / offline static validation
        run: npm run build
